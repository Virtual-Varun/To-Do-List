<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>To Do List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">


</head>

<body class="bg-light">
    <h1 class="text-center mt-4"> 
        <i class="bi bi-alarm"></i>

To Do List</h1>

<div class="container mt-4">

  <div class="d-flex justify-content-center align-items-center gap-2">
      <label><b>Enter the Task</b></label>
      <input id="tasks" type="text" class="form-control w-100 w-md-50 w-lg-25 text-center">

      <button type="button" class="btn btn-primary " onclick="addtasks()">Add Task</button>
  </div>

</div>

<div class="container mt-4">
<div class="d-flex flex-column align-items-center">
    <h3 ><i class="bi bi-check-circle-fill"></i>
Tasks</h3>
    <ul id="todo" class="list-group w-50 mt-2"></ul>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
function addtasks(){

    let tasks = document.getElementById("tasks");
    let listi = document.getElementById("todo");

    listi.innerHTML += 
    "<li class='list-group-item d-flex justify-content-between align-items-center'>" +
    "<span><input class='form-check-input me-2' type='checkbox'>" + tasks.value + "</span>" +
    "<button class='btn btn-danger btn-sm' onclick='removetask(this)'>Remove</button>" +
    "</li>";

    tasks.value="";
}

function removetask(button){
    button.parentElement.remove();
}

</script>

</body>
</html>
